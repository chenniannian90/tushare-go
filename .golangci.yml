linters:
  disable-all: true
  enable:
    - asciicheck
    - bodyclose
    - deadcode
    #    - depguard
    - dogsled
    #    - dupl
    - errcheck
    - exhaustive
    - exportloopref
    #- funlen
    # - gci
    #- gochecknoglobals
    #- gochecknoinits
    #- gocognit
    - goconst
    - gocritic
    #    - gocyclo
    #- godot
    - godox
    #- goerr113
    - gofmt
    #    - gofumpt
    - goheader
    - goimports
    - golint
    #- gomnd
    - gomodguard
    - goprintffuncname
    #    - gosec
    - gosimple
    - govet
    - ineffassign
    # - interfacer
    # - lll
    #- maligned
    - misspell
    - nakedret
    #- nestif
    #- nlreturn
    - noctx
    - nolintlint
    - prealloc
    - rowserrcheck
    - scopelint
    - sqlclosecheck
    - staticcheck
    - structcheck
    - stylecheck
    - testpackage
    - typecheck
    - unconvert
    #- unparam
    - unused
    - varcheck
    - whitespace
    #- wsl

run:
  skip-dirs:
    - pkg/components/agent
    - pkg/components/log_analysis
  skip-files:
    - ".*__generated\\.go$"
  tests: false
  timeout: 5m

linters-settings:
  goconst:
    min-occurrences: 100

issues:
  exclude-rules:
    - linters:
        - golint
      text: "don't use ALL_CAPS in Go names; use CamelCase"
      path: pkg/constants/enums
    - linters:
        - stylecheck
      text: "ST1003: should not use ALL_CAPS in Go names; use CamelCase instead"
      path: pkg/constants/enums
    - linters:
        - gosec
      text: "G101: Potential hardcoded credentials"
    - linters:
        - staticcheck
      text: "SA1019: package github.com/golang/protobuf/proto is deprecated"
    - linters:
        - staticcheck
      text: "SA1019: gitlab.Client is deprecated"
    - linters:
        - staticcheck
      text: "SA1019: gitlab.NewClient is deprecated"
    - linters:
        - gosec
      text: "G305: File traversal when extracting"
    - linters:
        - gosec
      text: "G110: Potential DoS vulnerability via decompression bomb"
    - linters:
        - gosec
      text: "G404: Use of weak random number generator"
    - linters:
        - exhaustive
      text: "missing cases in switch of type"
    - linters:
        - prealloc
      text: "Consider preallocating"
    - linters:
        - godox
      text: "Line contains TODO/BUG/FIXME"
