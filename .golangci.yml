version: 2

linters:
  disable-all: true
  enable:
    - asciicheck
    - bodyclose
    - dogsled
    - errcheck
    - exhaustive
    - goconst
    - gocritic
    - goheader
    - gomodguard
    - goprintffuncname
    - govet
    - ineffassign
    - misspell
    - nakedret
    - noctx
    - nolintlint
    - prealloc
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - testpackage
    - unconvert
    - unused
    - whitespace

run:
  go: "1.25"
  tests: false
  timeout: 5m

linters-settings:
  goconst:
    min-occurrences: 100

issues:
  exclude-dirs:
    - pkg/components/agent
    - pkg/components/log_analysis
    - examples
    - cmd/examples
    - pkg/sdk/api
    - pkg/mcp/tools
  exclude-files:
    - ".*__generated\\.go$"
    - ".*\\.bak$"
  exclude-rules:
    # Exclude sync/atomic issues for Go 1.23 compatibility
    - linters:
        - typecheck
      text: "could not import sync/atomic"
      path: pkg/sdk/config.go
    - linters:
        - revive
      text: "don't use ALL_CAPS in Go names; use CamelCase"
      path: pkg/constants/enums
    - linters:
        - stylecheck
      text: "ST1003: should not use ALL_CAPS in Go names; use CamelCase instead"
      path: pkg/constants/enums
    - linters:
        - gosec
      text: "G101: Potential hardcoded credentials"
    - linters:
        - staticcheck
      text: "SA1019: package github.com/golang/protobuf/proto is deprecated"
    - linters:
        - staticcheck
      text: "SA1019: gitlab.Client is deprecated"
    - linters:
        - staticcheck
      text: "SA1019: gitlab.NewClient is deprecated"
    - linters:
        - gosec
      text: "G305: File traversal when extracting"
    - linters:
        - gosec
      text: "G110: Potential DoS vulnerability via decompression bomb"
    - linters:
        - gosec
      text: "G404: Use of weak random number generator"
    - linters:
        - exhaustive
      text: "missing cases in switch of type"
    - linters:
        - prealloc
      text: "Consider preallocating"
    - linters:
        - godox
      text: "Line contains TODO/BUG/FIXME"
    - linters:
        - revive
      text: "unused-parameter: parameter 'key' seems to be unused"
    - linters:
        - revive
      text: "exported: type name will be used as"
