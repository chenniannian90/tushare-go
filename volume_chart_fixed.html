<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票成交量分析 - 最近10天</title>
    <!-- 添加多个CDN备用源 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        // 如果第一个CDN失败，尝试备用CDN
        if (typeof Chart === 'undefined') {
            document.write('<script src="https://unpkg.com/chart.js@4.4.0/dist/chart.umd.min.js"><\/script>');
        }
    </script>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 32px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .chart-container {
            position: relative;
            margin: 30px 0;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 10px;
            min-height: 400px; /* 确保容器有最小高度 */
        }
        .chart-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        .stat-value {
            font-size: 28px;
            font-weight: bold;
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #666;
            font-size: 14px;
        }
        .error-message {
            display: none;
            background-color: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 股票成交量分析</h1>
        <div class="subtitle">最近10天市场交易数据可视化</div>

        <div class="error-message" id="errorMessage"></div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">平均成交量</div>
                <div class="stat-value">15.90亿手</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">平均成交额</div>
                <div class="stat-value">26214.29亿元</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">最高成交量</div>
                <div class="stat-value">19.04亿手</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">最低成交量</div>
                <div class="stat-value">13.85亿手</div>
            </div>
        </div>

        <div class="chart-container">
            <div class="chart-title">成交量趋势图</div>
            <div class="loading" id="volumeChart-loading">加载中...</div>
            <canvas id="volumeChart"></canvas>
        </div>

        <div class="chart-container">
            <div class="chart-title">成交额趋势图</div>
            <div class="loading" id="amountChart-loading">加载中...</div>
            <canvas id="amountChart"></canvas>
        </div>

        <div class="chart-container">
            <div class="chart-title">涨跌家数对比</div>
            <div class="loading" id="riseFallChart-loading">加载中...</div>
            <canvas id="riseFallChart"></canvas>
        </div>

        <div class="footer">
            <p>数据来源: Tushare | 生成时间: 2026-03-08 23:10:42</p>
        </div>
    </div>

    <script>
        // 等待DOM完全加载和Chart.js库加载完成
        function initCharts() {
            try {
                // 检查Chart.js是否加载
                if (typeof Chart === 'undefined') {
                    showError('Chart.js 库加载失败，请检查网络连接或刷新页面重试。');
                    return;
                }

                console.log('开始初始化图表...');

                // 移除所有加载提示
                document.querySelectorAll('.loading').forEach(el => el.style.display = 'none');

                // 成交量图表
                const volumeCtx = document.getElementById('volumeChart');
                if (volumeCtx) {
                    new Chart(volumeCtx.getContext('2d'), {
                        type: 'bar',
                        data: {
                            labels: ["2026-02-27", "2026-03-02", "2026-03-03", "2026-03-04", "2026-03-05", "2026-03-06"],
                            datasets: [{
                                label: '成交量（亿手）',
                                data: [14.696140491500001, 18.056753226199998, 19.0379386221, 15.1543087273, 14.5847189128, 13.8453311577],
                                backgroundColor: 'rgba(54, 162, 235, 0.6)',
                                borderColor: 'rgba(54, 162, 235, 1)',
                                borderWidth: 2
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false, // 改善响应式行为
                            plugins: {
                                legend: {
                                    display: true,
                                    position: 'top'
                                }
                            },
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    title: {
                                        display: true,
                                        text: '成交量（亿手）'
                                    }
                                }
                            }
                        }
                    });
                    console.log('成交量图表初始化成功');
                }

                // 成交额图表
                const amountCtx = document.getElementById('amountChart');
                if (amountCtx) {
                    new Chart(amountCtx.getContext('2d'), {
                        type: 'line',
                        data: {
                            labels: ["2026-02-27", "2026-03-02", "2026-03-03", "2026-03-04", "2026-03-05", "2026-03-06"],
                            datasets: [{
                                label: '成交额（亿元）',
                                data: [25054.80227081, 30457.64686707, 31575.577436520005, 23879.41675351, 24125.907667209998, 22192.38855323],
                                backgroundColor: 'rgba(255, 99, 132, 0.2)',
                                borderColor: 'rgba(255, 99, 132, 1)',
                                borderWidth: 3,
                                fill: true,
                                tension: 0.4
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    display: true,
                                    position: 'top'
                                }
                            },
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    title: {
                                        display: true,
                                        text: '成交额（亿元）'
                                    }
                                }
                            }
                        }
                    });
                    console.log('成交额图表初始化成功');
                }

                // 涨跌家数图表
                const riseFallCtx = document.getElementById('riseFallChart');
                if (riseFallCtx) {
                    new Chart(riseFallCtx.getContext('2d'), {
                        type: 'bar',
                        data: {
                            labels: ["2026-02-27", "2026-03-02", "2026-03-03", "2026-03-04", "2026-03-05", "2026-03-06"],
                            datasets: [
                                {
                                    label: '上涨家数',
                                    data: [3271, 1142, 643, 1745, 4079, 4260],
                                    backgroundColor: 'rgba(255, 99, 132, 0.6)',
                                    borderColor: 'rgba(255, 99, 132, 1)',
                                    borderWidth: 2
                                },
                                {
                                    label: '下跌家数',
                                    data: [2068, 4282, 4807, 3640, 1306, 1154],
                                    backgroundColor: 'rgba(75, 192, 192, 0.6)',
                                    borderColor: 'rgba(75, 192, 192, 1)',
                                    borderWidth: 2
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    display: true,
                                    position: 'top'
                                }
                            },
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    title: {
                                        display: true,
                                        text: '股票数量'
                                    }
                                }
                            }
                        }
                    });
                    console.log('涨跌家数图表初始化成功');
                }

            } catch (error) {
                console.error('图表初始化失败:', error);
                showError('图表初始化失败: ' + error.message);
            }
        }

        // 显示错误信息
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            // 隐藏所有加载提示
            document.querySelectorAll('.loading').forEach(el => el.style.display = 'none');
        }

        // 确保DOM加载完成后再初始化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() {
                // 等待一小段时间确保Chart.js库完全加载
                setTimeout(initCharts, 100);
            });
        } else {
            // DOM已经加载完成
            setTimeout(initCharts, 100);
        }

        // 添加窗口加载完成的双重保险
        window.addEventListener('load', function() {
            if (typeof Chart !== 'undefined') {
                console.log('窗口加载完成，Chart.js已就绪');
            }
        });
    </script>
</body>
</html>
